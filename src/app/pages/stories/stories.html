<h2>Danh sách truyện tranh</h2>

@for (story of stories; track story.title; let i = $index)

{
  

<div class="story-card">
  <h3>{{ story.title }}</h3>


  <p>Tác giả: {{ story.author }}</p>
 

  <p>Lượt xem: {{ story.views }}</p>


 <p>Năm Phát Hành: {{ story.year}}</p>


 <p>Thể Loại: {{ story.genre}}</p>

<img src="{{ story.image }}" alt="{{ story.title }}" class="story-img" />


  @if (stories.length === 0  )


  {

    <p>Không có truyện nào được tìm thấy.</p>

  }

  
  
</div>


}
